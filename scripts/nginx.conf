# nginx snippet for relay.handoff.sh
# Drop this into /etc/nginx/sites-available/relay.handoff.sh
# and symlink to /etc/nginx/sites-enabled/, then:
#   certbot --nginx -d relay.handoff.sh

server {
    listen 80;
    server_name relay.handoff.sh;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name relay.handoff.sh;

    ssl_certificate     /etc/letsencrypt/live/relay.handoff.sh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.handoff.sh/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Raise timeouts — streaming inference jobs can run for minutes.
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (required for /ws/provider).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strip the consumer bearer token before logging to access.log.
        proxy_hide_header Authorization;
    }
}
